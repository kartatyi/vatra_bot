<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LeBot dashboard</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1d212a; --border: #2a2f3a;
    --text: #e6e8ec; --muted: #98a0ad; --green: #3fb950; --red: #f85149;
    --amber: #d29922; --blue: #58a6ff; --grey: #6e7681;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header h1 .dot { color: var(--green); }
  .spacer { flex: 1; }
  .controls { display: flex; gap: 6px; align-items: center; }
  .controls .seg { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .controls button {
    background: var(--panel2); color: var(--muted); border: 0; padding: 6px 12px;
    cursor: pointer; font-size: 13px;
  }
  .controls button:hover { color: var(--text); }
  .controls button.active { background: var(--blue); color: #06121f; font-weight: 600; }
  .controls .ghost {
    border: 1px solid var(--border); border-radius: 8px; background: var(--panel2);
    color: var(--muted); padding: 6px 12px; cursor: pointer;
  }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .notice {
    background: #3a2a12; border: 1px solid var(--amber); color: #f0d8a8;
    padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;
  }
  .hidden { display: none; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .kpi .value { font-size: 26px; font-weight: 650; margin-top: 4px; }
  .kpi .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  section { margin-top: 28px; }
  section > h2 { font-size: 15px; font-weight: 600; margin: 0 0 12px; color: var(--text); }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 820px) { .grid2 { grid-template-columns: 1fr; } }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: 0; }
  .mono { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 12px; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.good { background: #11331c; color: var(--green); }
  .pill.bad { background: #3a1614; color: var(--red); }
  .pill.warn { background: #3a2e12; color: var(--amber); }
  .bar-row { display: grid; grid-template-columns: 130px 1fr 64px; gap: 10px; align-items: center; margin: 7px 0; }
  .bar-row .name { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { background: var(--panel2); border-radius: 6px; height: 16px; overflow: hidden; display: flex; }
  .bar-track .seg-ok { background: var(--green); height: 100%; }
  .bar-track .seg-bad { background: var(--red); height: 100%; }
  .bar-track .seg-other { background: var(--grey); height: 100%; }
  .bar-row .pct { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  .empty { color: var(--muted); padding: 8px 2px; }
  .filter { width: 100%; padding: 8px 10px; margin-bottom: 12px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
  .reason { color: var(--muted); }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }
  footer { color: var(--muted); font-size: 12px; padding: 24px; text-align: center; }
  svg text { fill: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1><span class="dot">●</span> LeBot dashboard</h1>
  <div class="spacer"></div>
  <div class="controls">
    <div class="seg" id="window-seg">
      <button data-days="7">7d</button>
      <button data-days="30" class="active">30d</button>
      <button data-days="90">90d</button>
      <button data-days="0">All</button>
    </div>
    <button class="ghost" id="refresh">↻ Refresh</button>
  </div>
</header>

<main>
  <div id="notice" class="notice hidden"></div>

  <div class="kpis" id="kpis"></div>

  <section>
    <h2>Outcomes over time</h2>
    <div class="panel"><div id="timechart"></div></div>
  </section>

  <section class="grid2">
    <div>
      <h2>Platform reliability</h2>
      <div class="panel" id="platform-reliability"></div>
    </div>
    <div>
      <h2>Top platforms by failure rate</h2>
      <div class="panel" id="platform-failrate"></div>
    </div>
  </section>

  <section>
    <h2>Failing links</h2>
    <div class="panel">
      <input class="filter" id="failure-filter" placeholder="Filter by host, URL, or error…" />
      <div id="failures"></div>
    </div>
  </section>

  <section class="grid2">
    <div>
      <h2>Per-extractor breakdown</h2>
      <div class="panel" id="extractors"></div>
    </div>
    <div>
      <h2>Regressions by version</h2>
      <div class="panel" id="versions"></div>
    </div>
  </section>
</main>

<footer id="footer"></footer>

<script>
"use strict";
const state = { days: 30, data: null };
const $ = (id) => document.getElementById(id);

const fmtInt = (n) => (n ?? 0).toLocaleString("en-US");
const fmtPct = (frac) => (100 * (frac ?? 0)).toFixed(1) + "%";
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function ago(iso, nowIso) {
  if (!iso) return "—";
  const ms = new Date(nowIso).getTime() - new Date(iso).getTime();
  if (ms < 0 || isNaN(ms)) return "just now";
  const m = Math.floor(ms / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
}

function rateClass(frac) { return frac >= 0.85 ? "good" : frac >= 0.6 ? "warn" : "bad"; }

async function load() {
  try {
    const res = await fetch(`/api/data?days=${state.days}`, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    state.data = await res.json();
    render();
  } catch (e) {
    $("notice").className = "notice";
    $("notice").textContent = "Could not reach the dashboard API: " + e.message;
  }
}

function render() {
  const d = state.data;
  const notice = $("notice");
  if (d.notice) { notice.className = "notice"; notice.textContent = d.notice; }
  else { notice.className = "notice hidden"; }

  renderKpis(d);
  renderTimeChart(d.daily);
  renderReliability(d.topByVolume);
  renderFailRate(d.topByFailureRate);
  renderFailures(d.recentFailures, d.generatedAtUtc);
  renderExtractors(d.extractors);
  renderVersions(d.versions);

  const span = d.stats.firstEventAt
    ? `${d.stats.firstEventAt.slice(0, 10)} → ${(d.stats.lastEventAt || "").slice(0, 10)}`
    : "no data";
  $("footer").textContent = `Window: ${d.windowDays === 0 ? "all time" : d.windowDays + " days"} · `
    + `journal span ${span} · generated ${new Date(d.generatedAtUtc).toLocaleString()}`;
}

function kpi(label, value, sub) {
  return `<div class="kpi"><div class="label">${esc(label)}</div>`
    + `<div class="value">${value}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ""}</div>`;
}

function renderKpis(d) {
  const s = d.stats, lat = d.latency;
  $("kpis").innerHTML = [
    kpi("Processed", fmtInt(s.totalProcessed), `${fmtInt(s.distinctChats)} chats`),
    kpi("Success rate", `<span class="pill ${rateClass(s.successRate)}">${fmtPct(s.successRate)}</span>`,
      `${fmtInt(s.mediaReposts)} media · ${fmtInt(s.textFallbacks)} text`),
    kpi("Failures", fmtInt(s.failures), `${fmtInt(s.nothingExtracted + s.noExtractor)} skipped`),
    kpi("Avg latency", lat.sampleCount ? Math.round(lat.averageMs) + " ms" : "—", `p95 ${fmtInt(lat.p95Ms)} ms`),
    kpi("Last activity", ago(s.lastEventAt, d.generatedAtUtc), s.lastEventAt ? s.lastEventAt.slice(0, 16).replace("T", " ") : ""),
  ].join("");
}

function renderTimeChart(daily) {
  const host = $("timechart");
  if (!daily || daily.length === 0) { host.innerHTML = `<div class="empty">No events in this window.</div>`; return; }
  const W = 960, H = 220, padL = 36, padR = 36, padB = 28, padT = 12;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const maxTotal = Math.max(1, ...daily.map((x) => x.total));
  const n = daily.length;
  const slot = innerW / n;
  const bw = Math.max(2, Math.min(26, slot * 0.7));

  let bars = "", line = "", pts = [];
  daily.forEach((x, i) => {
    const cx = padL + slot * i + slot / 2;
    const other = Math.max(0, x.total - x.successes - x.failures);
    const hTot = (v) => (v / maxTotal) * innerH;
    let y = padT + innerH;
    const segs = [["var(--green)", x.successes], ["var(--grey)", other], ["var(--red)", x.failures]];
    for (const [color, v] of segs) {
      const h = hTot(v);
      if (h > 0) { y -= h; bars += `<rect x="${(cx - bw / 2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${color}" rx="1"><title>${x.date}: ${v}</title></rect>`; }
    }
    const rate = x.total ? x.successes / x.total : 0;
    pts.push([cx, padT + innerH - rate * innerH]);
  });
  line = `<polyline fill="none" stroke="var(--blue)" stroke-width="2" points="${pts.map((p) => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ")}" />`;

  // y grid: 0%, 50%, 100% for the success-rate line
  let grid = "";
  [0, 0.5, 1].forEach((f) => {
    const y = padT + innerH - f * innerH;
    grid += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--border)" stroke-dasharray="2 3" />`;
    grid += `<text x="${W - padR + 4}" y="${y + 3}">${(f * 100).toFixed(0)}%</text>`;
  });
  // x labels: first, mid, last
  let xlab = "";
  [0, Math.floor(n / 2), n - 1].forEach((i) => {
    if (i < 0 || i >= n) return;
    const cx = padL + slot * i + slot / 2;
    xlab += `<text x="${cx}" y="${H - 8}" text-anchor="middle">${daily[i].date.slice(5)}</text>`;
  });
  const legend = `<text x="${padL}" y="${H - 8}">█ success</text>`;

  host.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">`
    + grid + bars + line + xlab
    + `<text x="${padL}" y="${padT + 2}">bars: volume · line: success rate</text></svg>`;
}

function reliabilityRow(h, maxTotal) {
  const okW = h.total ? (h.successes / h.total) * 100 : 0;
  const badW = h.total ? (h.failures / h.total) * 100 : 0;
  const otherW = Math.max(0, 100 - okW - badW);
  const widthPct = (h.total / maxTotal) * 100;
  return `<div class="bar-row">`
    + `<div class="name" title="${esc(h.host)}">${esc(h.host)}</div>`
    + `<div class="bar-track" style="width:${Math.max(8, widthPct).toFixed(0)}%" title="${fmtInt(h.successes)} ok / ${fmtInt(h.failures)} fail / ${fmtInt(h.total)} total">`
    + `<div class="seg-ok" style="width:${okW}%"></div>`
    + `<div class="seg-other" style="width:${otherW}%"></div>`
    + `<div class="seg-bad" style="width:${badW}%"></div></div>`
    + `<div class="pct">${fmtPct(h.successRate)}</div></div>`;
}

function renderReliability(hosts) {
  const host = $("platform-reliability");
  if (!hosts || hosts.length === 0) { host.innerHTML = `<div class="empty">No platform data yet.</div>`; return; }
  const maxTotal = Math.max(1, ...hosts.map((h) => h.total));
  host.innerHTML = hosts.map((h) => reliabilityRow(h, maxTotal)).join("")
    + `<div class="sub" style="color:var(--muted);margin-top:8px;font-size:12px">`
    + `green = success · grey = nothing/no-extractor · red = failure · bar length = volume</div>`;
}

function renderFailRate(hosts) {
  const host = $("platform-failrate");
  if (!hosts || hosts.length === 0) { host.innerHTML = `<div class="empty">No platform has enough volume yet.</div>`; return; }
  host.innerHTML = `<table><thead><tr><th>Platform</th><th class="num">Fail rate</th><th class="num">Fails</th><th class="num">Total</th></tr></thead><tbody>`
    + hosts.map((h) => `<tr><td>${esc(h.host)}</td>`
      + `<td class="num"><span class="pill ${h.failureRate >= 0.4 ? "bad" : "warn"}">${fmtPct(h.failureRate)}</span></td>`
      + `<td class="num">${fmtInt(h.failures)}</td><td class="num">${fmtInt(h.total)}</td></tr>`).join("")
    + `</tbody></table>`;
}

function renderFailures(failures, nowIso) {
  const host = $("failures");
  if (!failures || failures.length === 0) { host.innerHTML = `<div class="empty">No failures recorded 🎉</div>`; return; }
  const filter = $("failure-filter").value.trim().toLowerCase();
  const rows = failures.filter((f) =>
    !filter || (f.host + " " + f.url + " " + (f.errorReason || "") + " " + (f.errorVariant || "")).toLowerCase().includes(filter));

  if (rows.length === 0) { host.innerHTML = `<div class="empty">No failures match “${esc(filter)}”.</div>`; return; }

  host.innerHTML = `<table><thead><tr><th>When</th><th>Host</th><th>Extractor</th><th>Error</th><th>Link</th></tr></thead><tbody>`
    + rows.map((f) => {
      const link = /^https?:\/\//i.test(f.url) ? `<a href="${esc(f.url)}" target="_blank" rel="noopener noreferrer">open</a>` : esc(f.url);
      const err = `<strong>${esc(f.errorVariant || "Error")}</strong>`
        + (f.errorReason ? `<div class="reason">${esc(f.errorReason)}</div>` : "");
      return `<tr><td title="${esc(f.occurredAt)}">${esc(ago(f.occurredAt, nowIso))}</td>`
        + `<td>${esc(f.host)}</td><td class="mono">${esc(f.extractor || "—")}</td>`
        + `<td>${err}</td><td>${link}</td></tr>`;
    }).join("")
    + `</tbody></table>`;
}

function renderExtractors(rows) {
  const host = $("extractors");
  if (!rows || rows.length === 0) { host.innerHTML = `<div class="empty">No extractor data yet.</div>`; return; }
  host.innerHTML = `<table><thead><tr><th>Extractor</th><th class="num">Total</th><th class="num">OK</th><th class="num">Fail</th><th class="num">Success</th></tr></thead><tbody>`
    + rows.map((x) => `<tr><td class="mono">${esc(x.extractor)}</td>`
      + `<td class="num">${fmtInt(x.total)}</td><td class="num">${fmtInt(x.successes)}</td><td class="num">${fmtInt(x.failures)}</td>`
      + `<td class="num"><span class="pill ${rateClass(x.successRate)}">${fmtPct(x.successRate)}</span></td></tr>`).join("")
    + `</tbody></table>`;
}

function renderVersions(rows) {
  const host = $("versions");
  if (!rows || rows.length === 0) { host.innerHTML = `<div class="empty">No version data yet.</div>`; return; }
  host.innerHTML = `<table><thead><tr><th>Version</th><th class="num">Total</th><th class="num">Success</th><th class="num">Δ</th></tr></thead><tbody>`
    + rows.map((v, i) => {
      let delta = "";
      if (i > 0) {
        const prev = rows[i - 1].successRate;
        const diff = v.successRate - prev;
        if (Math.abs(diff) >= 0.005) {
          delta = `<span class="${diff < 0 ? "delta-down" : "delta-up"}">${diff < 0 ? "▼" : "▲"} ${fmtPct(Math.abs(diff))}</span>`;
        }
      }
      return `<tr><td class="mono">${esc(v.botVersion)}</td><td class="num">${fmtInt(v.total)}</td>`
        + `<td class="num"><span class="pill ${rateClass(v.successRate)}">${fmtPct(v.successRate)}</span></td>`
        + `<td class="num">${delta}</td></tr>`;
    }).join("")
    + `</tbody></table>`;
}

// Wiring
$("window-seg").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-days]");
  if (!btn) return;
  [...$("window-seg").children].forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  state.days = parseInt(btn.dataset.days, 10);
  load();
});
$("refresh").addEventListener("click", load);
$("failure-filter").addEventListener("input", () => {
  if (state.data) renderFailures(state.data.recentFailures, state.data.generatedAtUtc);
});
setInterval(load, 60000);
load();
</script>
</body>
</html>
